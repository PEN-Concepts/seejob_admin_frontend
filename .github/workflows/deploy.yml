name: Deploy Admin Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /tmp/deploy_key
          command_timeout: 30m
          script: |
            cd /home/ubuntu/code/seejob-Admin
            git fetch origin main
            git reset --hard origin/main
            npm install
            npm run build
            rsync -av --delete dist/seejob-admin-frontend/ /var/www/html/frontend/dist/seejob-admin-frontend/
