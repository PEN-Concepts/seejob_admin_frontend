<header class="app-header flex align-items-center justify-content-between px-3">
  <div class="flex align-items-center gap-3">
    <p-button
      icon="pi pi-bars"
      [text]="true"
      [rounded]="true"
      size="small"
      class="burger-menu"
      (click)="onToggleMenu()"
    >
    </p-button>
  </div>
  <div class="flex align-items-center gap-2">
    <div
      class="user-dropdown flex align-items-center gap-2"
      (click)="userMenu.toggle($event)"
    >
      <p-avatar
        image="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=150&h=150&q=80"
        shape="circle"
        size="normal"
        class="user-avatar"
      >
      </p-avatar>
      <i class="pi pi-chevron-down dropdown-arrow"></i>
    </div>
    <p-menu
      #userMenu
      [model]="userMenuItems"
      [popup]="true"
      appendTo="body"
    ></p-menu>
  </div>
</header>
